# Gateway configuration
# Copy to gateway.yaml and adjust for your setup.

# Vadgr API URL
api_url: http://localhost:8000

# Webhook server port (receives messages from WhatsApp/Telegram/etc.)
webhook_port: 8585

# WhatsApp via Evolution API
whatsapp:
  evolution_url: http://localhost:8080
  instance_name: vadgr
  api_key: ""  # Set your Evolution API key

# Security
security:
  # Phone numbers allowed to interact (empty = allow all)
  allowed_senders:
    # - "5731200000"
    # - "5730000000"

  # Max commands per user per hour
  rate_limit: 10
  rate_window: 3600  # seconds

  # Audit log (optional)
  # audit_log_path: data/gateway_audit.jsonl
